[[tools]]
name = "search"
description = "Useful for searching on internet and provides raw information on a given topic."

[[tools.parameters]]
name = "query"
type = "string"
description = "The query to search on internet."


[[tools]]
name = "summarize"
description = "Useful for summarizing a given text. It provides a summary of the given text."

[[tools.parameters]]
name = "text"
type = "string"
description = "The text to summarize."


[[tools]]
name = "translate"
description = "Useful for translating a given text from one language to another. It provides a translated text."

[[tools.parameters]]
name = "text"
type = "string"
description = "The text to translate."

[[tools.parameters]]
name = "source_language"
type = "string"
description = "The source language of the text."

[[tools.parameters]]
name = "target_language"
type = "string"
description = "The target language of the text."